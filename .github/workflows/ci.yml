name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend-test:
    name: Backend Lint & Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
        env:
          NODE_ENV: test
          JWT_SECRET: ci-test-jwt-secret-key-minimum-32-characters-long
          REFRESH_TOKEN_SECRET: ci-test-refresh-token-secret-key-minimum-32-chars

  android-lint:
    name: Android Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create placeholder google-services.json (CI only)
        run: |
          cat > app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"khabarexpress-buyer","storage_bucket":"khabarexpress-buyer.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.khabarexpress.buyer"}},"oauth_client":[],"api_key":[{"current_key":"CI_PLACEHOLDER"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF
          cat > restaurant-app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"khabarexpress-seller","storage_bucket":"khabarexpress-seller.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:1111111111111111111111","android_client_info":{"package_name":"com.khabarexpress.seller"}},"oauth_client":[],"api_key":[{"current_key":"CI_PLACEHOLDER"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF

      - name: Lint Buyer App
        run: ./gradlew :app:lintDebug

      - name: Lint Seller App
        run: ./gradlew :restaurant-app:lintDebug

      - name: Upload Buyer Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buyer-lint-report
          path: app/build/reports/lint-results-debug.html

      - name: Upload Seller Lint Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seller-lint-report
          path: restaurant-app/build/reports/lint-results-debug.html

  android-unit-test:
    name: Android Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create placeholder google-services.json (CI only)
        run: |
          cat > app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"khabarexpress-buyer","storage_bucket":"khabarexpress-buyer.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.khabarexpress.buyer"}},"oauth_client":[],"api_key":[{"current_key":"CI_PLACEHOLDER"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF

      - name: Run Buyer App Unit Tests
        run: ./gradlew :app:testDebugUnitTest

      - name: Upload Buyer Test Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: buyer-unit-test-report
          path: app/build/reports/tests/testDebugUnitTest/

  android-build:
    name: Android Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Create placeholder google-services.json (CI only)
        run: |
          cat > app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"khabarexpress-buyer","storage_bucket":"khabarexpress-buyer.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000000000","android_client_info":{"package_name":"com.khabarexpress.buyer"}},"oauth_client":[],"api_key":[{"current_key":"CI_PLACEHOLDER"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF
          cat > restaurant-app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"khabarexpress-seller","storage_bucket":"khabarexpress-seller.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:1111111111111111111111","android_client_info":{"package_name":"com.khabarexpress.seller"}},"oauth_client":[],"api_key":[{"current_key":"CI_PLACEHOLDER"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF

      - name: Build Buyer App (debug)
        run: ./gradlew :app:assembleDebug

      - name: Build Seller App (debug)
        run: ./gradlew :restaurant-app:assembleDebug
